<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio | Home</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Prompt',sans-serif}
body{
min-height:100vh;display:flex;flex-direction:column;
background:linear-gradient(-45deg,#ffd1ea,#ff8fcf,#d76bff,#9b6bff);
background-size:400% 400%;
animation:bg 12s ease infinite;
overflow:hidden;color:#fff}
@keyframes bg{0%{background-position:0 50%}50%{background-position:100% 50%}100%{background-position:0 50%}}
body:before,body:after{
content:"";position:fixed;width:380px;height:380px;border-radius:50%;
filter:blur(90px);z-index:-1;opacity:.5}
body:before{background:#ff77c8;top:-120px;left:-80px;animation:f1 10s ease-in-out infinite}
body:after{background:#9b6bff;bottom:-120px;right:-80px;animation:f2 12s ease-in-out infinite}
@keyframes f1{50%{transform:translate(120px,80px)}}
@keyframes f2{50%{transform:translate(-120px,-80px)}}
nav{display:flex;justify-content:space-between;align-items:center;padding:20px 8%}
nav ul{display:flex;gap:24px;list-style:none}
nav a{color:#fff;text-decoration:none}
.hero{flex:1;display:flex;justify-content:center;align-items:center;padding:20px}
.card{
width:min(500px,92%);
background:rgba(255,255,255,.18);
backdrop-filter:blur(16px);
border:1px solid rgba(255,255,255,.3);
border-radius:28px;
padding:40px;
text-align:center;
box-shadow:0 20px 40px rgba(0,0,0,.2)}
.profile{
width:170px;height:170px;border-radius:50%;
border:5px solid #fff;object-fit:cover;background:#fff;margin-bottom:20px}
h1{
font-size:42px;
background:linear-gradient(90deg,#fff,#ffe3f8,#ffc2ea);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent}
h2{margin:10px 0}
p{line-height:1.7;margin-top:10px}
.buttons{margin-top:28px}
.btn{
display:inline-block;margin:8px;padding:14px 30px;border-radius:40px;
background:#fff;color:#c04bff;text-decoration:none;font-weight:700}
.btn.out{background:transparent;color:#fff;border:2px solid #fff}
.scroll{
position:fixed;left:50%;bottom:20px;transform:translateX(-50%);
display:flex;flex-direction:column;align-items:center;animation:updown 1.8s infinite}
.mouse{width:28px;height:46px;border:2px solid #fff;border-radius:20px;margin-top:8px}
.wheel{width:5px;height:10px;background:#fff;border-radius:3px;margin:7px auto;animation:wheel 1.6s infinite}
@keyframes wheel{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(14px)}}
@keyframes updown{50%{transform:translateX(-50%) translateY(8px)}}
</style>
</head>
<body>
<nav>
<div><b>Portfolio</b></div>
<ul>
<li><a href="#">Home</a></li>
<li><a href="#">About</a></li>
<li><a href="#">Portfolio</a></li>
<li><a href="#">Activities</a></li>
<li><a href="#">Contact</a></li>
</ul>
</nav>
<section class="hero">
<div class="card">
<img src="images/profile.jpg" class="profile" alt="Profile">
<h1>ภิญญดา บุญเจริญ</h1>
<h2>Student Portfolio</h2>
<p>นักเรียนชั้นมัธยมศึกษาปีที่ 6</p>
<p>ยินดีต้อนรับสู่เว็บไซต์ Portfolio สำหรับใช้ยื่นเข้าศึกษาต่อ</p>
<div class="buttons">
<a href="#" class="btn">About Me</a>
<a href="#" class="btn out">Portfolio</a>
</div>
</div>
</section>
<div class="scroll">
<div>Scroll Down</div>
<div class="mouse"><div class="wheel"></div></div>
</div>
</body>
</html>
