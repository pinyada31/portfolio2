<!DOCTYPE html>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Prompt',sans-serif;
}

html{
    scroll-behavior:smooth;
}

body{

    min-height:100vh;

    color:white;

    background:
    linear-gradient(
        -45deg,
        #ffd1ea,
        #ff8fcf,
        #d76bff,
        #8f7bff
    );

    background-size:400% 400%;

    animation:bg 14s ease infinite;

    overflow-x:hidden;

}

@keyframes bg{

    0%{
        background-position:0% 50%;
    }

    50%{
        background-position:100% 50%;
    }

    100%{
        background-position:0% 50%;
    }

}

body::before,
body::after{

    content:"";

    position:fixed;

    width:500px;
    height:500px;

    border-radius:50%;

    filter:blur(100px);

    opacity:.45;

    z-index:-1;

}

body::before{

    background:#ff63c5;

    top:-180px;
    left:-150px;

    animation:aurora1 12s ease-in-out infinite;

}

body::after{

    background:#806dff;

    right:-160px;
    bottom:-180px;

    animation:aurora2 14s ease-in-out infinite;

}

@keyframes aurora1{

    50%{
        transform:translate(150px,100px);
    }

}

@keyframes aurora2{

    50%{
        transform:translate(-150px,-100px);
    }

}


/* ================= NAVBAR ================= */

header{

    position:fixed;

    top:15px;

    left:7%;

    right:7%;

    z-index:1000;

    display:flex;

    justify-content:space-between;

    align-items:center;

    padding:18px 30px;

    border-radius:20px;

    background:rgba(255,255,255,.16);

    border:1px solid rgba(255,255,255,.35);

    backdrop-filter:blur(18px);

    box-shadow:0 10px 30px rgba(0,0,0,.12);

}

.logo{

    color:white;

    text-decoration:none;

    font-size:28px;

    font-weight:700;

}

nav ul{

    display:flex;

    gap:28px;

    list-style:none;

}

nav a{

    color:white;

    text-decoration:none;

    transition:.3s;

}

nav a:hover{

    color:#ffe0f5;

    text-shadow:0 0 12px white;

}


/* ================= HOME ================= */

.hero{

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    padding:150px 7% 80px;

}

.hero-card{

    max-width:850px;

    width:100%;

    padding:55px;

    text-align:center;

    background:rgba(255,255,255,.16);

    border:1px solid rgba(255,255,255,.35);

    border-radius:30px;

    backdrop-filter:blur(18px);

    box-shadow:0 25px 60px rgba(0,0,0,.16);

}

.profile{

    width:180px;

    height:180px;

    border-radius:50%;

    object-fit:cover;

    border:5px solid white;

    margin-bottom:25px;

    box-shadow:0 0 35px rgba(255,255,255,.4);

}

.hero-card h1{

    font-size:clamp(40px,7vw,70px);

    margin-bottom:10px;

    background:

    linear-gradient(

        90deg,

        white,

        #ffe0f5,

        white

    );

    -webkit-background-clip:text;

    -webkit-text-fill-color:transparent;

}

.hero-card h2{

    font-size:25px;

    margin-bottom:15px;

}

.hero-card p{

    font-size:18px;

    line-height:1.9;

}


/* ================= BUTTONS ================= */

.buttons{

    margin-top:30px;

}

.btn{

    display:inline-block;

    margin:8px;

    padding:13px 28px;

    border-radius:30px;

    background:white;

    color:#b94cff;

    text-decoration:none;

    font-weight:600;

    transition:.3s;

}

.btn:hover{

    transform:translateY(-5px);

    box-shadow:0 10px 25px rgba(255,255,255,.35);

}

.btn.out{

    background:transparent;

    color:white;

    border:2px solid white;

}


/* ================= SCROLL ================= */

.scroll{

    position:absolute;

    bottom:25px;

    left:50%;

    transform:translateX(-50%);

    text-align:center;

    animation:updown 1.8s infinite;

}

.mouse{

    width:27px;

    height:44px;

    margin:8px auto 0;

    border:2px solid white;

    border-radius:20px;

}

.wheel{

    width:5px;

    height:9px;

    margin:7px auto;

    background:white;

    border-radius:5px;

    animation:wheel 1.5s infinite;

}

@keyframes wheel{

    0%{

        opacity:1;

        transform:translateY(0);

    }

    100%{

        opacity:0;

        transform:translateY(14px);

    }

}

@keyframes updown{

    50%{

        transform:translateX(-50%) translateY(8px);

    }

}


/* ================= MOBILE ================= */

@media(max-width:850px){

    header{

        left:3%;

        right:3%;

        padding:15px 18px;

        flex-direction:column;

        gap:15px;

    }

    nav ul{

        gap:12px;

        flex-wrap:wrap;

        justify-content:center;

    }

    nav a{

        font-size:12px;

    }

    .hero{

        padding:180px 5% 80px;

    }

    .hero-card{

        padding:35px 20px;

    }

}

</style>

</head>
